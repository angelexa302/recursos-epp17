<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a3a5c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Recursos ADOSAC">
  <title>Reserva de Recursos</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      font-size: 16px;
    }
    .header {
      background: #1a3a5c;
      color: white;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .header img { height: 50px; width: 50px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .header-text { text-align: center; }
    .header-text .title { font-size: 18px; font-weight: bold; }
    .header-text .subtitle { font-size: 12px; opacity: 0.85; margin-top: 2px; }
    .card {
      background: white;
      padding: 20px 16px;
      width: 100%;
      min-height: calc(100vh - 80px);
    }
    .sub { color: #666; font-size: 14px; margin-bottom: 16px; }
    label {
      display: block;
      font-weight: 700;
      font-size: 15px;
      margin: 18px 0 6px;
      color: #1a3a5c;
    }
    select, input {
      width: 100%;
      padding: 14px 12px;
      border-radius: 10px;
      border: 2px solid #d0d7e3;
      font-size: 15px;
      color: #1a2e4a;
      background: #f8fafc;
      -webkit-appearance: none;
      appearance: none;
      display: block;
    }
    select:focus, input:focus { outline: none; border-color: #1a3a5c; }

    .horario-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 6px;
    }
    .horario-btn {
      padding: 12px 8px;
      border-radius: 10px;
      border: 2px solid #d0d7e3;
      background: #f8fafc;
      text-align: center;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      color: #1a2e4a;
    }
    .horario-btn.selected {
      background: #1a3a5c;
      color: white;
      border-color: #1a3a5c;
    }
    .horario-btn.ocupado {
      background: #fff0f0;
      color: #ccc;
      border-color: #f5c6c6;
      cursor: not-allowed;
      text-decoration: line-through;
    }

    .recursos-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 6px;
    }
    .recurso-btn {
      padding: 14px 12px;
      border-radius: 10px;
      border: 2px solid #d0d7e3;
      background: #f8fafc;
      text-align: left;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      color: #1a2e4a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .recurso-btn .icono { font-size: 20px; flex-shrink: 0; }
    .recurso-btn.selected {
      background: #e8f4fd;
      border-color: #1a3a5c;
      color: #1a3a5c;
    }
    .recurso-btn.ocupado {
      background: #fff5f5;
      border-color: #f5c6c6;
      color: #ccc;
      cursor: not-allowed;
    }
    .recurso-btn .badge {
      margin-left: auto;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      background: #e8f4fd;
      color: #1a3a5c;
      font-weight: 700;
    }
    .recurso-btn.ocupado .badge {
      background: #fff0f0;
      color: #e74c3c;
    }

    .btn-reservar {
      width: 100%;
      margin-top: 24px;
      padding: 16px;
      font-size: 16px;
      background: #1a3a5c;
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      display: block;
      letter-spacing: 0.5px;
    }
    .btn-reservar:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg {
      margin-top: 14px;
      padding: 14px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
      width: 100%;
    }
    .msg.ok {
      background: #e8f8f0;
      color: #1e7e4e;
      border: 1px solid #a3d9b8;
      display: block;
      text-align: center;
      font-weight: 600;
    }
    .msg.error {
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6c6;
      display: block;
    }
    .loading { color: #888; font-size: 14px; padding: 10px 0; }
    .seccion-titulo {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
      font-weight: normal;
    }
    .seleccionados-resumen {
      margin-top: 8px;
      padding: 10px 12px;
      background: #e8f4fd;
      border-radius: 8px;
      font-size: 13px;
      color: #1a3a5c;
      display: none;
    }
    @media (min-width: 600px) {
      .card {
        max-width: 500px;
        margin: 24px auto;
        border-radius: 16px;
        min-height: auto;
        box-shadow: 0 4px 24px rgba(0,0,0,0.10);
        padding: 28px 24px;
      }
    }
  </style>
</head>

const HORARIOS = [{"hora": "1", "horario": "07:30 a 08:10"}, {"hora": "2", "horario": "08:10 a 08:50"}, {"hora": "3", "horario": "09:00 a 09:40"}, {"hora": "4", "horario": "09:40 a 10:20"}, {"hora": "5", "horario": "10:30 a 11:10"}];
const RECURSOS = ["Control remoto proyector", "Equipo de sonido", "Mapa Argentina", "Mapa Santa Cruz", "Planisferio", "Mapa Mercosur"];
const ICONOS = {
  'Control remoto proyector': '📽️',
  'Equipo de sonido': '🔊',
  'Mapa Argentina': '🗺️',
  'Mapa Santa Cruz': '🗺️',
  'Planisferio': '🌍',
  'Mapa Mercosur': '🗺️',
};

let horariosSeleccionados = [];
let recursosSeleccionados = [];
let disponibilidad = {};

// Cargar fechas al iniciar
function inicializar() {
  const select = document.getElementById('fechaSelect');
  // Agrupar por mes
  let mesActual = '';
  FECHAS.forEach(f => {
    if (f.mes !== mesActual) {
      mesActual = f.mes;
      const opt = document.createElement('option');
      opt.disabled = true;
      opt.textContent = '── ' + f.mes + ' ──';
      select.appendChild(opt);
    }
    const opt = document.createElement('option');
    opt.value = f.fecha;
    opt.textContent = f.fecha + ' — ' + f.dia;
    select.appendChild(opt);
  });
}

async function onFechaChange() {
  const fecha = document.getElementById('fechaSelect').value;
  horariosSeleccionados = [];
  recursosSeleccionados = [];
  
  if (!fecha) {
    document.getElementById('horarioGrid').innerHTML = '<div class="loading">Primero elegí una fecha</div>';
    document.getElementById('recursosGrid').innerHTML = '<div class="loading">Primero elegí fecha y horario</div>';
    verificarFormulario();
    return;
  }

  document.getElementById('horarioGrid').innerHTML = '<div class="loading">Cargando horarios...</div>';
  
  try {
    const res = await fetch(APPS_SCRIPT_URL + '?action=getDisponibilidad&fecha=' + encodeURIComponent(fecha));
    disponibilidad = await res.json();
    renderHorarios();
  } catch(e) {
    document.getElementById('horarioGrid').innerHTML = '<div class="loading" style="color:red">Error al cargar. Intentá de nuevo.</div>';
  }
  verificarFormulario();
}

function renderHorarios() {
  const grid = document.getElementById('horarioGrid');
  grid.innerHTML = '';
  HORARIOS.forEach(h => {
    const div = document.createElement('div');
    div.className = 'horario-btn';
    div.dataset.hora = h.hora;
    div.innerHTML = `<strong>Hora ${h.hora}</strong><br><span style="font-size:11px;opacity:0.8">${h.horario}</span>`;
    div.onclick = function() { toggleHorario(this, h.hora); };
    grid.appendChild(div);
  });
}

function toggleHorario(el, hora) {
  if (horariosSeleccionados.includes(hora)) {
    horariosSeleccionados = horariosSeleccionados.filter(h => h !== hora);
    el.classList.remove('selected');
  } else {
    horariosSeleccionados.push(hora);
    el.classList.add('selected');
  }
  renderRecursos();
  verificarFormulario();
}

function renderRecursos() {
  const grid = document.getElementById('recursosGrid');
  
  if (horariosSeleccionados.length === 0) {
    grid.innerHTML = '<div class="loading">Primero elegí un horario</div>';
    recursosSeleccionados = [];
    actualizarResumen();
    return;
  }

  grid.innerHTML = '';
  RECURSOS.forEach(recurso => {
    // Verificar si está ocupado en ALGUNO de los horarios seleccionados
    let ocupadoPor = null;
    for (const hora of horariosSeleccionados) {
      const key = hora + '_' + recurso;
      if (disponibilidad[key]) {
        ocupadoPor = disponibilidad[key];
        break;
      }
    }

    const div = document.createElement('div');
    const icono = ICONOS[recurso] || '📦';
    
    if (ocupadoPor) {
      div.className = 'recurso-btn ocupado';
      div.innerHTML = `
        <span class="icono">${icono}</span>
        <span>${recurso}</span>
        <span class="badge">Reservado</span>
      `;
      div.title = 'Reservado por: ' + ocupadoPor;
    } else {
      const seleccionado = recursosSeleccionados.includes(recurso);
      div.className = 'recurso-btn' + (seleccionado ? ' selected' : '');
      div.innerHTML = `
        <span class="icono">${icono}</span>
        <span>${recurso}</span>
        <span class="badge">${seleccionado ? '✓ Seleccionado' : 'Disponible'}</span>
      `;
      div.onclick = function() { toggleRecurso(recurso); };
    }
    grid.appendChild(div);
  });
  actualizarResumen();
}

function toggleRecurso(recurso) {
  if (recursosSeleccionados.includes(recurso)) {
    recursosSeleccionados = recursosSeleccionados.filter(r => r !== recurso);
  } else {
    recursosSeleccionados.push(recurso);
  }
  renderRecursos();
  verificarFormulario();
}

function actualizarResumen() {
  const div = document.getElementById('resumen');
  if (recursosSeleccionados.length === 0) {
    div.style.display = 'none';
    return;
  }
  div.style.display = 'block';
  div.innerHTML = '✅ Seleccionados: ' + recursosSeleccionados.join(', ');
}

function verificarFormulario() {
  const nombre = document.getElementById('nombre').value.trim();
  const curso = document.getElementById('curso').value.trim();
  const fecha = document.getElementById('fechaSelect').value;
  const btn = document.getElementById('btnReservar');
  btn.disabled = !(nombre && curso && fecha && horariosSeleccionados.length > 0 && recursosSeleccionados.length > 0);
}

async function confirmarReserva() {
  const nombre = document.getElementById('nombre').value.trim();
  const curso = document.getElementById('curso').value.trim();
  const fecha = document.getElementById('fechaSelect').value;
  const msg = document.getElementById('mensaje');

  document.getElementById('btnReservar').disabled = true;
  document.getElementById('btnReservar').textContent = 'Procesando...';
  msg.className = 'msg';
  msg.textContent = '';

  try {
    const params = new URLSearchParams({
      action: 'realizarReserva',
      fecha: fecha,
      horarios: horariosSeleccionados.join(','),
      recursos: recursosSeleccionados.join('|'),
      nombre: nombre,
      curso: curso
    });

    const res = await fetch(APPS_SCRIPT_URL + '?' + params.toString());
    const data = await res.json();

    if (data.ok) {
      msg.className = 'msg ok';
      msg.textContent = '✅ ¡Reserva confirmada! ' + data.detalle;
      // Reset
      document.getElementById('fechaSelect').value = '';
      document.getElementById('horarioGrid').innerHTML = '<div class="loading">Primero elegí una fecha</div>';
      document.getElementById('recursosGrid').innerHTML = '<div class="loading">Primero elegí fecha y horario</div>';
      document.getElementById('nombre').value = '';
      document.getElementById('curso').value = '';
      horariosSeleccionados = [];
      recursosSeleccionados = [];
      document.getElementById('resumen').style.display = 'none';
    } else {
      msg.className = 'msg error';
      msg.textContent = '⚠️ ' + data.mensaje;
    }
  } catch(e) {
    msg.className = 'msg error';
    msg.textContent = 'Error de conexión. Intentá de nuevo.';
  }

  document.getElementById('btnReservar').disabled = false;
  document.getElementById('btnReservar').textContent = 'CONFIRMAR RESERVA';
}

inicializar();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
